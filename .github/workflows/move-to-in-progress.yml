name: Move to In Progress when assigned

on:
  issues:
    types: [assigned]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  move-to-in-progress:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          github-token: ${{ secrets.PROJECT_TOKEN }}
          script: |
            const projectId    = "PVT_kwHOAV33Zs4BUsab";
            const fieldId      = "PVTSSF_lAHOAV33Zs4BUsabzhCIIbQ";
            const inProgressId = "47fc9ee4";

            const query1 = `
              query($issueId: ID!) {
                node(id: $issueId) {
                  ... on Issue {
                    projectItems(first: 10) {
                      nodes {
                        id
                        project { id }
                      }
                    }
                  }
                }
              }
            `;

            const result = await github.graphql(query1, {
              issueId: context.payload.issue.node_id
            });

            const item = result.node.projectItems.nodes
              .find(function(n) { return n.project.id === projectId; });

            if (!item) {
              console.log("この Issue は対象 Project に追加されていません");
              return;
            }

            const mutation = `
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item { id }
                }
              }
            `;

            await github.graphql(mutation, {
              projectId:  projectId,
              itemId:     item.id,
              fieldId:    fieldId,
              optionId:   inProgressId
            });

            console.log("ステータスを In Progress に更新しました");
