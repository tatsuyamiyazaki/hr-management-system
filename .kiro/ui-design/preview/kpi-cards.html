<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>KPI Cards</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:24px;background:var(--sb-slate-50);width:700px;font-family:var(--font-jp)}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;box-shadow:var(--shadow-1)}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.k{font-size:12px;color:var(--foreground-muted);font-weight:500}
.ic{width:28px;height:28px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center}
.v{font-family:var(--font-sans);font-size:30px;font-weight:700;font-variant-numeric:tabular-nums;letter-spacing:-0.02em;line-height:1}
.sub{font-size:11px;color:var(--foreground-muted);margin-top:6px}
.delta{font-size:11px;font-weight:600;display:inline-flex;gap:2px}
.up{color:var(--sb-success-700)}
.dn{color:var(--sb-danger-700)}
.ft{margin-top:10px;display:flex;justify-content:space-between;align-items:center}
</style></head><body>
<div class="grid">
  <div class="card">
    <div class="top"><div class="k">評価完了率</div><div class="ic" style="background:var(--sb-navy-50);color:var(--sb-navy-700)">✓</div></div>
    <div class="v">78.4<span style="font-size:16px;color:var(--foreground-muted)">%</span></div>
    <div class="ft"><span class="sub">978 / 1,248名</span><span class="delta up">↑ 12.3pt</span></div>
  </div>
  <div class="card">
    <div class="top"><div class="k">目標達成率</div><div class="ic" style="background:var(--sb-info-50);color:var(--sb-info-700)">◎</div></div>
    <div class="v">64.2<span style="font-size:16px;color:var(--foreground-muted)">%</span></div>
    <div class="ft"><span class="sub">2026 Q1</span><span class="delta up">↑ 3.1pt</span></div>
  </div>
  <div class="card">
    <div class="top"><div class="k">AI月次コスト</div><div class="ic" style="background:var(--sb-ai-50);color:var(--sb-ai-700)">◆</div></div>
    <div class="v">$892<span style="font-size:16px;color:var(--foreground-muted)">.40</span></div>
    <div class="ft"><span class="sub">予算 $1,100</span><span class="delta" style="color:var(--sb-warning-700)">▲ 81%</span></div>
  </div>
</div>
</body></html>
