<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>Type Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>

.row{display:flex;align-items:baseline;gap:16px;padding:10px 0;border-bottom:1px solid var(--border)}
.row:last-child{border-bottom:none}
.spec{font-family:var(--font-mono);font-size:11px;color:var(--foreground-subtle);min-width:120px}

<div class="row"><div class="spec">display 48/700</div><div class="display">89.4</div></div>

<div class="row"><div class="spec">h2 22/700</div><h2 style="margin:0">2026年度上期</h2></div>
<div class="row"><div class="spec">h3 18/600</div><h3 style="margin:0">ピア評価の品質担保</h3></div>

<div class="row"><div class="spec">body 14/400</div><div class="body">建設的なフィードバックをAIと対話しながら作成します。</div></div>
<div class="row"><div class="spec">small 13/400</div><div class="small">最低評価者数を下回る場合は公開を保留します</div></div>
<div class="row"><div class="spec">caption 12/400</div><div class="caption">2026-04-18 09:32 JST</div></div>
<div class="row"><div class="spec">mono 13/400</div><code>cycleId: ckxy2k3l...</code></div>
</body></html>
