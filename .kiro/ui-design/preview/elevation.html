<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>Elevation</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>

.e{background:#fff;width:130px;height:90px;border-radius:var(--radius-lg);border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}

.sp{font-family:var(--font-mono);font-size:10px;color:var(--foreground-muted)}

<div class="e" style="box-shadow:var(--shadow-0)"><div class="name">Elev 0</div><div class="sp">flat</div></div>
<div class="e" style="box-shadow:var(--shadow-1)"><div class="name">Elev 1</div><div class="sp">card</div></div>
<div class="e" style="box-shadow:var(--shadow-2)"><div class="name">Elev 2</div><div class="sp">dropdown</div></div>
<div class="e" style="box-shadow:var(--shadow-3)"><div class="name">Elev 3</div><div class="sp">modal</div></div>
