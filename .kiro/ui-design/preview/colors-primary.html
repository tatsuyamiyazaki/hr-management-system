<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8"><title>Color Palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
body{margin:0;padding:20px;background:var(--surface);width:700px}
.row{display:flex;gap:6px;margin-bottom:14px}
.sw{flex:1;height:54px;border-radius:var(--radius-md);display:flex;flex-direction:column;justify-content:flex-end;padding:6px 8px;font-family:var(--font-mono);font-size:10px;color:#fff;border:1px solid rgba(0,0,0,0.04)}
.sw.lt{color:var(--sb-slate-900)}
.label{font-family:var(--font-jp);font-size:11px;font-weight:600;color:var(--foreground-muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px}
</style></head><body>
<div class="label">Sunbit Navy — Primary</div>
<div class="row">
  <div class="sw lt" style="background:var(--sb-navy-50)">50</div>
  <div class="sw lt" style="background:var(--sb-navy-100)">100</div>
  <div class="sw lt" style="background:var(--sb-navy-200)">200</div>
  <div class="sw lt" style="background:var(--sb-navy-300)">300</div>
  <div class="sw" style="background:var(--sb-navy-400)">400</div>
  <div class="sw" style="background:var(--sb-navy-500)">500</div>
  <div class="sw" style="background:var(--sb-navy-600)">600★</div>
  <div class="sw" style="background:var(--sb-navy-700)">700</div>
  <div class="sw" style="background:var(--sb-navy-800)">800</div>
  <div class="sw" style="background:var(--sb-navy-900)">900</div>
</div>
<div class="label">Slate — Neutrals</div>
<div class="row">
  <div class="sw lt" style="background:var(--sb-slate-50)">50</div>
  <div class="sw lt" style="background:var(--sb-slate-100)">100</div>
  <div class="sw lt" style="background:var(--sb-slate-200)">200</div>
  <div class="sw lt" style="background:var(--sb-slate-300)">300</div>
  <div class="sw lt" style="background:var(--sb-slate-400)">400</div>
  <div class="sw" style="background:var(--sb-slate-500)">500</div>
  <div class="sw" style="background:var(--sb-slate-600)">600</div>
  <div class="sw" style="background:var(--sb-slate-700)">700</div>
  <div class="sw" style="background:var(--sb-slate-800)">800</div>
  <div class="sw" style="background:var(--sb-slate-900)">900</div>
</div>
</body></html>
